<ion-content fullscreen class="reset">
  <div class="bg" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <div class="topbar">
    <ion-button fill="clear" class="back" routerLink="/login" aria-label="Volver al login">
      <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
    </ion-button>
  </div>

  <div class="card" role="region" aria-label="Cambiar contraseña">
    <div class="brand">
      <div class="mark">CC</div>
      <div class="brand-text">
        <div class="name">Company Care</div>
        <div class="sub">Recuperación</div>
      </div>
    </div>

    <h1 class="title">Nueva contraseña</h1>
    <p class="hint">Crea una contraseña nueva para tu cuenta.</p>

    <form class="form" (ngSubmit)="submit()">
      <label class="field" aria-label="Nueva contraseña">
        <ion-icon name="lock-closed-outline" aria-hidden="true"></ion-icon>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          autocomplete="new-password"
          placeholder="Nueva contraseña"
          required
        />
      </label>

      <label class="field" aria-label="Confirmar contraseña">
        <ion-icon name="checkmark-circle-outline" aria-hidden="true"></ion-icon>
        <input
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          type="password"
          autocomplete="new-password"
          placeholder="Confirmar contraseña"
          required
        />
      </label>

      <div class="msg error" *ngIf="error">{{ error }}</div>
      <div class="msg success" *ngIf="success">{{ success }}</div>

      <button class="primary" type="submit" [disabled]="loading">
        <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        <span *ngIf="!loading">Actualizar</span>
      </button>
    </form>
  </div>
</ion-content>

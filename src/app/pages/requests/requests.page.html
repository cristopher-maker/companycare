<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Mis solicitudes</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="refresh()" [disabled]="loading">Actualizar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card *ngIf="error">
    <ion-card-header>
      <ion-card-title>Error</ion-card-title>
    </ion-card-header>
    <ion-card-content>{{ error }}</ion-card-content>
  </ion-card>

  <ion-skeleton-text *ngIf="loading" animated="true" style="width: 100%; height: 120px"></ion-skeleton-text>

  <ion-list *ngIf="!loading && !error">
    <ion-item *ngFor="let r of items">
      <ion-label>
        <h2>{{ r.topic }}</h2>
        <p>{{ r.channel }} • Estado: {{ r.status }}</p>
        <p>{{ r.created_at | date: 'medium' }}</p>
      </ion-label>
      <ion-button slot="end" fill="outline" routerLink="/care-experts">Abrir</ion-button>
    </ion-item>
  </ion-list>

  <ion-card *ngIf="!loading && !error && items.length === 0">
    <ion-card-content>
      Aún no tienes solicitudes. Puedes iniciar una en <a routerLink="/care-experts">Care Experts</a>.
    </ion-card-content>
  </ion-card>
</ion-content>
